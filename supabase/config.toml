# External partner API key validation. Callers present a partner-issued
# Bearer key (not a Supabase JWT), so platform JWT verification is bypassed
# in favor of the function's own SHA-256 hash + validate_api_key RPC check.
[functions.validate-api-key]
verify_jwt = false

# Guardian agent is driven by pg_cron (guardian-automated-monitoring every 5 min,
# guardian-daily-summary daily), which authenticate with the new `sb_secret_*` key.
# That key is NOT a JWT, so the gateway's verify_jwt rejects it as
# UNAUTHORIZED_INVALID_JWT_FORMAT before the function runs. JWT verification is
# bypassed here in favor of the function's own cron-secret check
# (isAuthorizedServerCaller: X-Cron-Secret / Bearer == CRON_SECRET or SB_SECRET_KEY).
[functions.guardian-agent]
verify_jwt = false

# Security alert processor is driven by pg_cron (every minute) with the new
# `sb_secret_*` key — same non-JWT-vs-gateway problem as guardian-agent. The
# function already enforces its own cron-secret check (accepts CRON_SECRET /
# SB_SECRET_KEY), so JWT verification is bypassed at the gateway here.
[functions.security-alert-processor]
verify_jwt = false

# Email functions are invoked edge-to-edge with the new `sb_secret_*` key (a
# non-JWT), e.g. guardian-agent and emergency-alert-dispatch -> send-email. The
# gateway's default verify_jwt would reject that key as UNAUTHORIZED_INVALID_JWT_FORMAT,
# so it is pinned off here; both functions enforce their own Bearer/service-key auth.
# Pinned to lock the working live state — a plain redeploy would otherwise default to
# verify_jwt=true and silently break guardian + emergency alert emails.
[functions.send-email]
verify_jwt = false

[functions.send_welcome_email]
verify_jwt = false

# emergency-alert-dispatch is invoked server-to-server (DB webhook / non-JWT key) and
# calls send-email with the service key. It ran verify_jwt=false; pinned here so a
# redeploy doesn't default it to true and reject the non-JWT caller at the gateway.
[functions.emergency-alert-dispatch]
verify_jwt = false
