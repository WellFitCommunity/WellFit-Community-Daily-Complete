name: Weekly Housekeeping

# Runs the 10 manual infra-health checks from PROJECT_STATE.md every Sunday
# at 23:00 UTC (≈ Sunday evening US time). Posts the report as a GitHub issue
# labeled "housekeeping" so Maria sees it Monday morning.
#
# Required repository secrets:
#   VERCEL_TOKEN              — Vercel API token, scoped to maria-leblancs-projects
#   SUPABASE_ACCESS_TOKEN     — Supabase personal access token
#
# Optional repository variables:
#   VERCEL_TEAM_ID            (defaults baked into script)
#   VERCEL_PROJECT_ID         (defaults baked into script)
#   SUPABASE_PROJECT_REF      (defaults baked into script)
#
# Missing secrets cause the related checks to SKIP, not crash the run.

on:
  schedule:
    # Sunday 23:00 UTC = Sunday 6 PM Central (Houston) / 7 PM Eastern
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print report to logs only, don't create issue"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write   # to create the report issue

jobs:
  housekeep:
    name: Run housekeeping checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Repo stores the Supabase personal access token as SB_ACCESS_TOKEN; fall back to
      # SUPABASE_ACCESS_TOKEN if that name is ever added. Without this the Supabase
      # security + performance advisor checks silently SKIP.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || secrets.SB_ACCESS_TOKEN }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node (for npx supabase invocations the script may call)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run housekeeping script
        id: hk
        run: |
          # Capture report to file so we can both display it AND post as issue.
          # Don't fail this step on exit 1 (FAIL findings) — we still want
          # to post the report. The job result reflects whether all PASS.
          set +e
          python3 scripts/weekly-housekeeping.py > housekeeping-report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          echo "=== Report ==="
          cat housekeeping-report.md

      - name: Post report as GitHub issue
        if: ${{ !inputs.dry_run }}
        env:
          EXIT_CODE: ${{ steps.hk.outputs.exit_code }}
        run: |
          # Title includes status icon so the issue list is scannable.
          if [ "$EXIT_CODE" = "0" ]; then
            ICON="✅"
            STATUS_LINE="all checks pass"
          else
            ICON="❌"
            STATUS_LINE="needs attention"
          fi
          DATE=$(date -u +%Y-%m-%d)
          TITLE="${ICON} Weekly Housekeeping ${DATE} — ${STATUS_LINE}"

          # Create the issue. Label "housekeeping" — created on first run
          # if it doesn't exist.
          gh label create housekeeping --color FBCA04 --description "Automated weekly infra-health reports" 2>/dev/null || true

          gh issue create \
            --title "$TITLE" \
            --body-file housekeeping-report.md \
            --label housekeeping

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: housekeeping-report
          path: housekeeping-report.md
          retention-days: 90

      - name: Job summary
        if: always()
        run: cat housekeeping-report.md >> "$GITHUB_STEP_SUMMARY"
