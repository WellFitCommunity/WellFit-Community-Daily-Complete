# .github/workflows/secret-scan.yml
# Enforces adversarial-audit-lessons Rule 3: no secrets in VITE_* env vars.
# Scans for VITE_*(KEY|SECRET|TOKEN) patterns outside an allowlist of
# public-by-design names (Firebase, hCaptcha site key, Supabase publishable, etc).
name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

jobs:
  vite-secret-scan:
    name: VITE_* Secret Pattern Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run VITE_* secret pattern check
        run: bash scripts/check-vite-secrets.sh

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## VITE_* Secret Scan: PASS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No unauthorized VITE_*(KEY|SECRET|TOKEN) references detected." >> $GITHUB_STEP_SUMMARY
          else
            echo "## VITE_* Secret Scan: FAIL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Unauthorized VITE_*(KEY|SECRET|TOKEN) reference(s) detected." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Why this matters:** VITE_* env vars are bundled into the browser." >> $GITHUB_STEP_SUMMARY
            echo "Any value with KEY, SECRET, or TOKEN in its name is presumed to be a real secret." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**How to fix:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Move the secret to an edge function (server-side only)." >> $GITHUB_STEP_SUMMARY
            echo "2. Remove the VITE_ prefix." >> $GITHUB_STEP_SUMMARY
            echo "3. If the value is genuinely public-by-design, add it to the ALLOWLIST in \`scripts/check-vite-secrets.sh\`." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See \`.claude/rules/adversarial-audit-lessons.md\` Rule 3." >> $GITHUB_STEP_SUMMARY
          fi
